apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: service-b
  namespace: services
spec:
  interval: 1m
  chart:
    spec:
      chart: ./apps/service-b/helm
      sourceRef:
        kind: GitRepository
        name: platform-gitops
        namespace: flux-system
  values:
    image:
      repository: service-b
      tag: latest
    service:
      port: 8080
    ingress:
      enabled: true
      className: nginx
      host: service-b.local
