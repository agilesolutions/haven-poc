apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "app.fullname" . }}-configmap
data:
  application.yaml: |
    app:
      featureToggle: {{ .Values.config.featureToggle }}
      maxOrders: {{ .Values.config.maxOrders }}
    spring:
      security:
        oauth2:
          client:
            registration:
              keycloak:
                clientId: {{ .Values.oidc.clientId }}
                clientSecret: {{ .Values.oidc.clientSecret }}
                authorizationGrantType: client_credentials