apiVersion: helm.toolkit.fluxcd.io/v2beta2
kind: HelmRelease
metadata:
  name: keycloak
  namespace: keycloak
spec:
  interval: 1h
  chart:
    spec:
      chart: keycloakx
      version: "7.1.9" # Use specific version for stability
      sourceRef:
        kind: HelmRepository
        name: codecentric
        namespace: flux-system
  values:
    # KeycloakX Configuration
    keycloak:
      replicas: 2
      # Persistent storage configuration is essential for production
      persistence:
        enabled: true
      # Database connection configuration (e.g., PostgreSQL)
      database:
        vendor: postgres
        host: postgres-host
        name: keycloak
        username: keycloak
        password: "keycloak"
      # Ingress to expose keycloak
      ingress:
        enabled: false
        hostname: ://example.com
    # ... additional customizations
