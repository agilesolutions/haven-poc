apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: keycloakx
  namespace: flux-system
spec:
  interval: 10m

  targetNamespace: keycloak
  install:
    createNamespace: true

  chart:
    spec:
      chart: keycloakx
      version: "7.1.9"
      sourceRef:
        kind: HelmRepository
        name: keycloakx
        namespace: flux-system
      interval: 5m

  values:
    health:
      enabled: false
    replicas: 1

    image:
      tag: "latest"

    service:
      type: ClusterIP

    ingress:
      enabled: true
      className: nginx
      hosts:
        - host: keycloak.example.com
          paths:
            - path: /
              pathType: Prefix

    postgresql:
      enabled: true

    http:
      port: 8080

    startupProbe:
      httpGet:
        path: /health
        port: 8080
      failureThreshold: 30
      periodSeconds: 10

    readinessProbe:
      httpGet:
        path: /health/ready
        port: 8080
      initialDelaySeconds: 30
      periodSeconds: 10

    livenessProbe:
      httpGet:
        path: /health/live
        port: 8080
      initialDelaySeconds: 60
      periodSeconds: 20

    resources:
      requests:
        cpu: "200m"
        memory: "512Mi"
      limits:
        cpu: "500m"
        memory: "1Gi"