apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: keycloak
  namespace: keycloak
spec:
  interval: 5m
  install:
    createNamespace: true
  chart:
    spec:
      chart: keycloak
      version: "25.2.0"
      sourceRef:
        kind: HelmRepository
        name: bitnami
        namespace: flux-system

  values:
    image:
      repository: bitnamilegacy/keycloak
      tag: 26.3.3-debian-12-r0

    auth:
      adminUser: admin
      adminPassword: admin123   # ⚠️ vervangen via secret in productie

    proxy: edge

    service:
      type: ClusterIP

    ingress:
      enabled: true
      ingressClassName: nginx
      hostname: keycloak.local
      path: /
      annotations:
        nginx.ingress.kubernetes.io/rewrite-target: /

    postgresql:
      enabled: true
      auth:
        postgresPassword: keycloak
        username: keycloak
        password: keycloak
        database: keycloak

      primary:
        persistence:
          enabled: true
          size: 1Gi

    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        cpu: 500m
        memory: 1Gi

    metrics:
      enabled: false
      serviceMonitor:
        enabled: false