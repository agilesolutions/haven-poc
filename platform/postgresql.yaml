apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: postgresql
  namespace: database
spec:
  interval: 5m
  install:
    createNamespace: true
  chart:
    spec:
      chart: postgresql
      version: "18.5.15"
      sourceRef:
        kind: HelmRepository
        name: bitnami
        namespace: flux-system

  values:
    image:
      repository: bitnami/postgresql
      tag: latest
    global:
      storageClass: ""   # gebruik default (Docker Desktop ok)

    auth:
      postgresPassword: postgres
      username: appuser
      password: apppassword
      database: appdb

    primary:
      persistence:
        enabled: true
        size: 1Gi

    service:
      type: ClusterIP

    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi