apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: keycloak
  namespace: keycloak
spec:
  interval: 5m
  install:
    createNamespace: true
  chart:
    spec:
      chart: keycloak
      version: "22.0.0"
      sourceRef:
        kind: HelmRepository
        name: bitnami
        namespace: flux-system

  values:
    auth:
      adminUser: admin
      adminPassword: admin123   # ⚠️ vervangen via secret in productie

    proxy: edge

    service:
      type: ClusterIP

    ingress:
      enabled: true
      ingressClassName: nginx
      hostname: keycloak.local
      path: /
      annotations:
        nginx.ingress.kubernetes.io/rewrite-target: /

    postgresql:
      enabled: true
      auth:
        postgresPassword: keycloak
        username: keycloak
        password: keycloak
        database: keycloak

    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        cpu: 500m
        memory: 1Gi